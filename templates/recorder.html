<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Record Voice Note</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        /* Meeting Context Card */
        .meeting-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            border: 1px solid #334155;
        }

        .meeting-card .label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            margin-bottom: 4px;
        }

        .meeting-card .attendee-name {
            font-size: 24px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 4px;
        }

        .meeting-card .meeting-title {
            font-size: 15px;
            color: #94a3b8;
            margin-bottom: 16px;
        }

        .meeting-card .meeting-time {
            font-size: 14px;
            color: #64748b;
        }

        /* Recording UI */
        .recorder {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .timer {
            font-size: 48px;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
            color: #f8fafc;
            margin-bottom: 32px;
            letter-spacing: 2px;
        }

        .timer.recording {
            color: #ef4444;
        }

        /* Waveform animation */
        .waveform {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 40px;
            margin-bottom: 32px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .waveform.active {
            opacity: 1;
        }

        .waveform .bar {
            width: 4px;
            background: #ef4444;
            border-radius: 2px;
            animation: wave 0.8s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 32px; }
        }

        .waveform .bar:nth-child(1) { animation-delay: 0s; }
        .waveform .bar:nth-child(2) { animation-delay: 0.1s; }
        .waveform .bar:nth-child(3) { animation-delay: 0.2s; }
        .waveform .bar:nth-child(4) { animation-delay: 0.3s; }
        .waveform .bar:nth-child(5) { animation-delay: 0.15s; }
        .waveform .bar:nth-child(6) { animation-delay: 0.25s; }
        .waveform .bar:nth-child(7) { animation-delay: 0.05s; }
        .waveform .bar:nth-child(8) { animation-delay: 0.35s; }
        .waveform .bar:nth-child(9) { animation-delay: 0.12s; }

        /* Record button */
        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid #475569;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .record-btn:active {
            transform: scale(0.95);
        }

        .record-btn .inner {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #ef4444;
            transition: all 0.2s;
        }

        .record-btn.recording .inner {
            width: 28px;
            height: 28px;
            border-radius: 6px;
        }

        .record-btn.recording {
            border-color: #ef4444;
        }

        .hint {
            margin-top: 16px;
            font-size: 14px;
            color: #64748b;
        }

        /* Status Messages */
        .status {
            margin-top: 32px;
            text-align: center;
            min-height: 60px;
        }

        .status .message {
            font-size: 15px;
            padding: 12px 20px;
            border-radius: 12px;
            display: inline-block;
        }

        .status .message.uploading {
            background: #1e3a5f;
            color: #60a5fa;
        }

        .status .message.success {
            background: #14532d;
            color: #4ade80;
        }

        .status .message.error {
            background: #450a0a;
            color: #fca5a5;
        }

        /* Already recorded state */
        .already-recorded {
            text-align: center;
            padding: 40px 20px;
        }

        .already-recorded .checkmark {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .already-recorded h2 {
            font-size: 20px;
            color: #4ade80;
            margin-bottom: 8px;
        }

        .already-recorded p {
            color: #94a3b8;
            font-size: 15px;
        }

        /* Error state */
        .error-state {
            text-align: center;
            padding: 40px 20px;
        }

        .error-state h2 {
            font-size: 20px;
            color: #fca5a5;
            margin-bottom: 8px;
        }

        .error-state p {
            color: #94a3b8;
            font-size: 15px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
        }

        .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading meeting info...</p>
        </div>
    </div>

    <script>
        // ======================================================
        // Voice Note Recorder
        // ======================================================

        const API_BASE = window.location.origin;
        const MEETING_ID = window.location.pathname.split('/').pop();

        let mediaRecorder = null;
        let audioChunks = [];
        let timerInterval = null;
        let secondsElapsed = 0;
        let meetingData = null;

        // --- Initialize ---
        async function init() {
            try {
                const response = await fetch(`${API_BASE}/api/meetings/${MEETING_ID}`);
                if (!response.ok) {
                    showError('Meeting not found', 'This recording link may have expired or the meeting was not found.');
                    return;
                }

                meetingData = await response.json();

                if (meetingData.status === 'note_received' || meetingData.status === 'processed') {
                    showAlreadyRecorded();
                    return;
                }

                renderRecorder();
            } catch (err) {
                console.error('Init error:', err);
                showError('Connection Error', 'Could not connect to the server. Check your internet connection.');
            }
        }

        // --- Render the recorder UI ---
        function renderRecorder() {
            const app = document.getElementById('app');
            const externalAttendees = getExternalAttendees();
            const primaryName = externalAttendees.length > 0 ? externalAttendees[0] : 'Unknown';
            const meetingTime = new Date(meetingData.end_time).toLocaleTimeString('en-US', {
                hour: 'numeric',
                minute: '2-digit',
                hour12: true,
            });

            app.innerHTML = `
                <div class="meeting-card">
                    <div class="label">You just met with</div>
                    <div class="attendee-name">${escapeHtml(primaryName)}</div>
                    <div class="meeting-title">${escapeHtml(meetingData.title)}</div>
                    <div class="meeting-time">Ended at ${meetingTime}</div>
                </div>

                <div class="recorder">
                    <div class="timer" id="timer">0:00</div>

                    <div class="waveform" id="waveform">
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                    </div>

                    <button class="record-btn" id="recordBtn" onclick="toggleRecording()">
                        <div class="inner"></div>
                    </button>
                    <div class="hint" id="hint">Tap to record</div>
                </div>

                <div class="status" id="status"></div>
            `;
        }

        // --- Recording logic ---
        async function toggleRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                stopRecording();
            } else {
                await startRecording();
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

                // Determine supported MIME type (iOS Safari uses mp4, Chrome uses webm)
                let mimeType = 'audio/webm;codecs=opus';
                if (typeof MediaRecorder.isTypeSupported === 'function') {
                    if (!MediaRecorder.isTypeSupported(mimeType)) {
                        mimeType = 'audio/mp4';
                    }
                    if (!MediaRecorder.isTypeSupported(mimeType)) {
                        mimeType = '';  // Let browser pick default
                    }
                }

                const options = mimeType ? { mimeType } : {};
                mediaRecorder = new MediaRecorder(stream, options);
                audioChunks = [];

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        audioChunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = async () => {
                    // Stop all tracks to release the microphone
                    stream.getTracks().forEach(track => track.stop());
                    await uploadAudio();
                };

                mediaRecorder.start(1000);  // Collect data every second

                // Update UI
                document.getElementById('recordBtn').classList.add('recording');
                document.getElementById('timer').classList.add('recording');
                document.getElementById('waveform').classList.add('active');
                document.getElementById('hint').textContent = 'Tap to stop';

                // Start timer
                secondsElapsed = 0;
                timerInterval = setInterval(() => {
                    secondsElapsed++;
                    const mins = Math.floor(secondsElapsed / 60);
                    const secs = secondsElapsed % 60;
                    document.getElementById('timer').textContent =
                        `${mins}:${secs.toString().padStart(2, '0')}`;
                }, 1000);

            } catch (err) {
                console.error('Microphone access error:', err);
                showStatus('error', 'Microphone access denied. Please allow microphone access and try again.');
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }

            clearInterval(timerInterval);

            document.getElementById('recordBtn').classList.remove('recording');
            document.getElementById('timer').classList.remove('recording');
            document.getElementById('waveform').classList.remove('active');
            document.getElementById('hint').textContent = '';
        }

        // --- Upload audio ---
        async function uploadAudio() {
            showStatus('uploading', 'Uploading and processing...');

            // Determine file extension from MIME type
            const mimeType = audioChunks[0]?.type || 'audio/mp4';
            const ext = mimeType.includes('webm') ? 'webm' : 'm4a';

            const blob = new Blob(audioChunks, { type: mimeType });
            const formData = new FormData();
            formData.append('audio', blob, `recording.${ext}`);

            try {
                const response = await fetch(
                    `${API_BASE}/api/meetings/${MEETING_ID}/upload`,
                    {
                        method: 'POST',
                        body: formData,
                    }
                );

                if (response.ok) {
                    showStatus('success', 'Voice note saved and processing. You can close this page.');
                    // Disable further recording
                    const btn = document.getElementById('recordBtn');
                    if (btn) btn.style.display = 'none';
                } else {
                    const errData = await response.json().catch(() => ({}));
                    showStatus('error', errData.detail || 'Upload failed. Please try again.');
                }
            } catch (err) {
                console.error('Upload error:', err);
                showStatus('error', 'Network error during upload. Please check your connection and try again.');
            }
        }

        // --- UI helpers ---
        function showStatus(type, message) {
            const el = document.getElementById('status');
            if (el) {
                el.innerHTML = `<div class="message ${type}">${escapeHtml(message)}</div>`;
            }
        }

        function showAlreadyRecorded() {
            document.getElementById('app').innerHTML = `
                <div class="meeting-card">
                    <div class="label">Meeting</div>
                    <div class="attendee-name">${escapeHtml(meetingData.title)}</div>
                </div>
                <div class="already-recorded">
                    <div class="checkmark">✓</div>
                    <h2>Already Recorded</h2>
                    <p>A voice note has already been submitted for this meeting.</p>
                </div>
            `;
        }

        function showError(title, message) {
            document.getElementById('app').innerHTML = `
                <div class="error-state">
                    <h2>${escapeHtml(title)}</h2>
                    <p>${escapeHtml(message)}</p>
                </div>
            `;
        }

        function getExternalAttendees() {
            if (!meetingData) return [];
            const names = (meetingData.attendee_names || '').split(',').map(n => n.trim()).filter(Boolean);
            const emails = (meetingData.attendee_emails || '').split(',').map(e => e.trim()).filter(Boolean);
            const external = [];
            for (let i = 0; i < emails.length; i++) {
                if (!emails[i].endsWith('@sidelinegroup.co')) {
                    external.push(names[i] || emails[i].split('@')[0]);
                }
            }
            return external;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        // --- Start ---
        init();
    </script>
</body>
</html>
